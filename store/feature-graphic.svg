<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <radialGradient id="board" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#2a2a3a"/>
      <stop offset="60%" stop-color="#1c1c28"/>
      <stop offset="100%" stop-color="#13131a"/>
    </radialGradient>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8ff47"/>
      <stop offset="100%" stop-color="#c4e600"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(232,255,71,0.15)"/>
      <stop offset="100%" stop-color="rgba(232,255,71,0)"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="500" fill="url(#bg)"/>

  <!-- Glow behind dartboard -->
  <ellipse cx="780" cy="250" rx="240" ry="240" fill="url(#glow)"/>

  <!-- Dartboard (right side) -->
  <g transform="translate(780, 250)" opacity="0.35">
    <circle r="180" fill="url(#board)" stroke="#3a3a4a" stroke-width="2"/>
    <circle r="135" fill="none" stroke="#3a3a4a" stroke-width="1.5"/>
    <circle r="90" fill="none" stroke="#3a3a4a" stroke-width="1.5"/>
    <circle r="45" fill="none" stroke="#e8ff47" stroke-width="2" opacity="0.5"/>
    <circle r="18" fill="#e8ff47" opacity="0.6"/>
    <!-- Dart -->
    <line x1="0" y1="0" x2="-70" y2="-120" stroke="#e8ff47" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
    <polygon points="-70,-120 -84,-140 -58,-130" fill="#e8ff47" opacity="0.8"/>
    <circle r="7" fill="#ff6b35"/>
  </g>

  <!-- App icon area -->
  <g transform="translate(80, 140)">
    <circle r="48" fill="url(#board)" stroke="#e8ff47" stroke-width="2" opacity="0.8"/>
    <circle r="20" fill="none" stroke="#3a3a4a" stroke-width="1"/>
    <circle r="8" fill="#e8ff47" opacity="0.9"/>
  </g>

  <!-- Title -->
  <text x="160" y="120" font-family="'Bebas Neue', sans-serif" font-size="64" font-weight="bold" fill="#e8ff47" letter-spacing="6">STEEL DARTS PRO</text>

  <!-- Subtitle -->
  <text x="160" y="165" font-family="sans-serif" font-size="22" fill="rgba(255,255,255,0.65)">Score Tracker &amp; Practice App</text>

  <!-- Feature pills -->
  <g transform="translate(160, 200)">
    <rect width="110" height="32" rx="16" fill="rgba(232,255,71,0.12)" stroke="rgba(232,255,71,0.3)" stroke-width="1"/>
    <text x="55" y="21" font-family="sans-serif" font-size="13" fill="#e8ff47" text-anchor="middle">Count-Up</text>

    <rect x="120" width="60" height="32" rx="16" fill="rgba(232,255,71,0.12)" stroke="rgba(232,255,71,0.3)" stroke-width="1"/>
    <text x="150" y="21" font-family="sans-serif" font-size="13" fill="#e8ff47" text-anchor="middle">01</text>

    <rect x="190" width="85" height="32" rx="16" fill="rgba(232,255,71,0.12)" stroke="rgba(232,255,71,0.3)" stroke-width="1"/>
    <text x="232" y="21" font-family="sans-serif" font-size="13" fill="#e8ff47" text-anchor="middle">Cricket</text>

    <rect x="285" width="100" height="32" rx="16" fill="rgba(232,255,71,0.12)" stroke="rgba(232,255,71,0.3)" stroke-width="1"/>
    <text x="335" y="21" font-family="sans-serif" font-size="13" fill="#e8ff47" text-anchor="middle">CPU Sim</text>
  </g>

  <!-- Bottom features -->
  <text x="160" y="290" font-family="sans-serif" font-size="16" fill="rgba(255,255,255,0.45)">Checkout Training  |  Statistics  |  Offline PWA  |  Free</text>

  <!-- CTA -->
  <rect x="160" y="320" width="200" height="44" rx="22" fill="url(#acc)"/>
  <text x="260" y="348" font-family="sans-serif" font-size="16" font-weight="bold" fill="#0a0a0f" text-anchor="middle">Free - Play Now</text>

  <!-- Border -->
  <rect x="12" y="12" width="1000" height="476" rx="12" fill="none" stroke="rgba(232,255,71,0.2)" stroke-width="1.5"/>
</svg>
